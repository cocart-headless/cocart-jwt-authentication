name: ✨ Enhancement Request
description: Suggest an idea to improve an existing feature in CoCart JWT Authentication, or request something needed for development (such as a new hook or filter).
title: "[Enhancement]: "
labels: ["type: enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for contributing!

        Please provide us with the information requested in this form.

        Make sure to look through [existing `type: enhancement` issues](https://github.com/cocart-headless/cocart-jwt-authentication/issues?q=is%3Aopen+is%3Aissue+label%3A%22type%3A+enhancement%22) and [issues needing votes](https://github.com/cocart-headless/cocart-jwt-authentication/issues?q=is%3Aissue+sort%3Areactions-%2B1-desc+label%3A%22needs%3A+votes%22) to see whether your idea is already being discussed.
        Feel free to contribute to any existing issues.
        Search tip: You can filter issues using [our labels](https://github.com/cocart-headless/cocart-jwt-authentication/labels).
        Search tip: Make use of [GitHub's search syntax](https://help.github.com/en/github/searching-for-information-on-github/searching-issues-and-pull-requests) to refine your search.

  - type: textarea
    id: problem
    attributes:
      label: Describe the problem this solves
      description: A clear and concise description of the problem or gap this enhancement addresses.
      placeholder: When authenticating via JWT, I can't...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. If relevant, include the authentication flow, hooks, or filters you'd expect.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or approaches you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the enhancement request here.
